<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanify Analytics</title>
    <link rel="stylesheet" href="ana.css">
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="sidebar-brand">
            <h2>Scanify</h2>
            <img src="../assets/logo.png" alt="Scanify Logo" class="brand-logo">

        </div>
        <button onclick="goBack()"> Back</button>
    </div>

    <!-- Heading -->
    <h1 class="heading">Analytics Dashboard</h1>

    <div class="analytics-container">
        <div class="cards">
            <div class="card">
                <img src="../assets/totalana.png">
                <div>
                    <h2 id="total">0</h2>
                    <p>TOTAL PRODUCTS</p>
                </div>
            </div>
            <div class="card">
                <img src="../assets/expiredana.png">
                <div>
                    <h2 id="expired">0</h2>
                    <p>EXPIRED</p>
                </div>
            </div>
            <div class="card">
                <img src="../assets/expiringana.png">
                <div>
                    <h2 id="soon">0</h2>
                    <p>EXPIRING SOON</p>
                </div>
            </div>
            <div class="card">
                <img src="../assets/activeana.png">
                <div>
                    <h2 id="active">0</h2>
                    <p>ACTIVE</p>
                </div>
            </div>
        </div>
    </div>

    <div id="emptyState" class="empty-state-analytics hidden">
        <div class="empty-content">
            <h3>No Data to Analyze</h3>
            <p>Add products in the dashboard to view your expiry analytics.</p>
        </div>
    </div>


    <!-- Charts -->
    <div class="charts">
        <canvas id="pieChart"></canvas>
        <canvas id="barChart"></canvas>
    </div>

    <p class="footer">Data updated: Today</p>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./ana.js" defer></script>

</body>

</html>
