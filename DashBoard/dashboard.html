<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanify Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <div class="layout">
        <!-- Mobile-Only Header -->
        <div class="mobile-nav">
            <div class="menu-icon" onclick="toggleMobileMenu()">☰</div>
            <div class="mobile-logo">
                <span class="brand-green">Scanify</span>
                <img class="logo" src="/assets/logo.png" alt="">
            </div>

            <div class="placeholder"></div> <!-- Keeps logo centered -->

            <div class="mobile-bell-wrapper" onclick="toggleNotifications()">
                <span class="bell-icon">🔔</span>
                <span id="notif-dot-mobile" class="red-dot" style="display: none;"></span>
            </div>
        </div>

        <!-- Mobile-Only Action Button -->
        <button class="mobile-fab" onclick="openModal()">Add Product</button>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-close" onclick="toggleMobileMenu()">×</div>
            <div class="sidebar-brand">
                <h2>Scanify</h2>
                <img src="../assets/logo.png" alt="Scanify Logo" class="brand-logo">

            </div>

            <ul>
                <li onclick="filterProducts('all')" class="active">All</li>
                <li onclick="filterProducts('active')">Active</li>
                <li onclick="filterProducts('soon')">Expiring Soon</li>
                <li onclick="filterProducts('expired')">Expired</li>

                <li class="sidebar-search-item">
                    <input type="text" id="mobileSearch" placeholder="🔍 Search item..." oninput="syncSearch(this)">
                </li>
            </ul>

            <!-- New Section for Mobile Actions -->
            <div class="mobile-menu-footer">
                <button class="outline-btn" onclick="goToAnalytics()">Analytics</button>
                <button class="outline-btn" onclick="goToInsights()">Insights</button>
                <button class="danger-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Main -->
        <div class="main">

            <!-- Topbar -->
            <div class="topbar">
                <button class="outline-btn" onclick="openModal()">
                    Add Product
                </button>
                <input type="text" id="search" placeholder="Search product..." />

                <div class="top-actions">
                    <button class="icon-btn" onclick="toggleNotifications()">🔔</button>
                    <button class="outline-btn" onclick="goToAnalytics()">Analytics</button>
                    <button class="outline-btn" onclick="goToInsights()">Insights</button>
                    <button class="danger-btn" onclick="logout()">Logout</button>
                </div>
            </div>

            <!-- Cards -->
            <div class="cards">

                <div class="card">
                    <img src="../assets/total.png">
                    <div>
                        <p>Total Products</p>
                        <h2 id="totalCount">0</h2>
                    </div>
                </div>

                <div class="card">
                    <img src="../assets/expiring.png">
                    <div>
                        <p>Expiring Soon</p>
                        <h2 id="soonCount">0</h2>
                    </div>
                </div>

                <div class="card">
                    <img src="../assets/expired.png">
                    <div>
                        <p>Expired Items</p>
                        <h2 id="expiredCount">0</h2>
                    </div>
                </div>

            </div>

            <!-- Bottom Section -->
            <div class="bottom">


                <!-- Table -->
                <div class="table-section">
                    <table>
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Product Name</th>
                                <th>Expiry Date</th>
                                <th>Days Left</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productTable"></tbody>
                    </table>
                </div>

            </div>

        </div>

    </div>

    <!-- 3. The new Modal Structure (Place before end of body) -->
    <div id="addProductModal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <span class="close-btn" onclick="closeModal()">✖</span>
            </div>

            <h3>Add New Product</h3>

            <p id="addError" class="error-msg"></p>

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" placeholder="Enter name">
            </div>

            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" id="expiryDate">
            </div>

            <button class="add-btn" onclick="addProduct()">Add</button>
        </div>
    </div>

    <div id="editProductModal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <span class="close-btn" onclick="closeEditModal()">✖</span>
            <h3>Edit Product</h3>
            <input type="hidden" id="editIndex">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" id="editDate">
            </div>
            <button class="add-btn" onclick="updateProduct()">Update</button>
        </div>
    </div>



    <!-- Notification UI -->
    <div id="notificationContainer" style="display: none;"></div>

    <div id="notificationPanel" class="notification-panel hidden">

        <div class="notif-header">
            <h3>Scanify Notifications</h3>
            <span class="close-btn" onclick="closeNotifications()">✖</span>
        </div>

        <div class="notif-section">
            <span>System Notifications</span>
            <span class="notif-count" id="notifCount">0</span>
        </div>

        <div id="notificationList" class="notif-list"></div>

        <div class="notif-footer">
            <span onclick="clearNotifications()">Clear All</span>
            <button onclick="markAllRead()">Mark All Read</button>
        </div>

    </div>


    <script src="dashboard.js"></script>
</body>

</html>
