<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackify Insights</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="insights.css">
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">

        <div class="sidebar-brand">
            <h2>Trackify</h2>

            <img
                src="../assets/logo.png"
                alt="Trackify Logo"
                class="brand-logo"
            >
        </div>

        <button class="back-btn" onclick="goBack()">
            Back
        </button>

    </div>

    <!-- Heading -->
    <h1 class="heading">Smart Insights</h1>

    <!-- Greeting Section -->
    <div class="insights-header">

        <!-- FIXED: ONLY ONE GREETING -->
        <div id="welcomeGreeting" class="greeting-banner"></div>

        <p class="sub-text">
            Here's a deep dive into your product savings
            and waste analytics.
        </p>

    </div>

    <!-- Insights Cards -->
    <div class="insights-container">

        <div class="insight-card warning">
            <h3>⚠️ Expiring Soon</h3>
            <p id="soonText">Loading...</p>
        </div>

        <div class="insight-card danger">
            <h3>🚨 Expired</h3>
            <p id="expiredText">Loading...</p>
        </div>

        <div class="insight-card suggestion">
            <h3>💡 Use First</h3>
            <p id="suggestText">Loading...</p>
        </div>

        <div
            class="insight-card waste"
            onclick="openWasteModal()"
        >
            <h3>📉 Waste Report</h3>
            <p id="wasteText">Loading...</p>
        </div>

    </div>

    <!-- Waste Modal -->
    <div id="wasteModal" class="modal hidden">

        <div class="modal-content">

            <span
                class="close-btn"
                onclick="closeWasteModal()"
            >
                ✖
            </span>

            <h2>📉 Waste Details</h2>

            <p id="aiMessage"></p>

            <ul id="wasteList"></ul>

        </div>

    </div>

    <script src="insights.js"></script>

</body>
</html>
